# audit:allow test-scenario-coverage reason: 시각 회귀 없는 토큰 동치 시맨틱 자산 치환 — Playwright cross-product 가드 불필요. 자산 정의는 admin_basic main.css SSoT, 호출처는 자산명만 사용. board admin_board_settings.json 은 옵션 B (responsive padding 유지) 결정에 따라 자식 padding 토큰을 root .admin-page-content-responsive 로 흡수 + sticky-section-header → sticky-tab-nav-responsive 변경 — 시각 동일.

feature: 게시판/이커머스 어드민 페이지 root wrapper 시맨틱 자산 매핑 (#408 보강)

description: |
  이슈 #408 §2-1 PO 매핑 결정 적용 — board/ec admin 레이아웃의 페이지 root wrapper
  raw className 잔존분을 admin_basic 시맨틱 자산으로 정합.

  결정 요약:
    - board admin_board_settings: 자식 padding 토큰을 root 로 흡수 후
      .admin-page-content-responsive 매핑 + sticky-section-header 를
      .sticky-tab-nav-responsive (신설, -mx-4 sm:-mx-6 lg:-mx-8 px-4 sm:px-6 lg:px-8)
      로 변경 — responsive padding 정책 화면의 sticky 풀-bleed 복원
    - ec admin_ecommerce_product_common_info_index / product_notice_index:
      .admin-page-content-viewport (신설, p-6 + h-[calc(100vh-64px)] + overflow-hidden)
      + responsive.portable 분기는 .admin-page-content-viewport-compact (신설, p-4 변형)
    - ec admin_ecommerce_mileage_deposit_settings: .admin-page-content 매핑
      (배경 토큰 누락 회귀 정리 — ec 21건 동질)

