notes:
  - 버전 배지 SSoT 는 편집기 routes 응답 `layout_versions` (LayoutVersionRepository.getCurrentVersionsByTemplateId — 이력 보유 레이아웃만 최신 버전). 저장 동기화는 PUT 응답 `data.current_version`(LayoutService.updateLayout 가 saveVersion 결과를 transient 부착) → SaveResult.newContentVersion → SET_LAYOUT_VERSION. 복원 동기화는 restore 응답 `data.version` → onRestored(newVersion) → SET_LAYOUT_VERSION.
  - 모달/반복 항목 편집 저장도 호스트 레이아웃 PUT(동일 경로)이라 savedLayoutName(호스트) 키로 배지가 동기화된다.
 - 확장(주입 조각)은 별도 도메인(template_layout_extension_versions)으로 동일 체계 지원 — 트리 확장 노드 배지 SSoT 는 layout-extensions index 응답 `current_version`(LayoutExtensionVersionRepository.getCurrentVersionsByExtensionIds), 저장 동기화는 확장 PUT 응답 `current_version`(updateExtension transient) → SaveResult.savedExtensionId → SET_EXTENSION_VERSION, 복원 동기화는 확장 restore 응답 `data.version` → onRestored(newVersion) → SET_EXTENSION_VERSION. 버전 기록 모달은 VersionTarget(layout|extension)으로 확장 전용 API 분기(확장 단건 응답 content JSON 문자열 → full_content 파싱으로 diff 비교 경로 통일).
  - version_change_action=save_first 는 baseline(v1)+저장본(v2) 두 버전 적재 → current_version=2 (LayoutControllerTest.test_can_update_layout). save_repeat/restore 의 누적은 기존 LayoutVersionIntegrationTest + useLayoutDocument 단위가 커버.
  - 스크롤 락 격리는 편집기 전용(usePreviewBodyScrollIsolation — 동일 문서 렌더 부수효과 차단). 런타임 사이트의 모달 body 락은 그대로 동작(언마운트 후 무개입 단위 테스트로 가드).
  - E2E 는 공유 dev DB 를 변형하지 않도록 읽기 전용 검증(배지↔맵 정합 + 모달 모드 body overflow)으로 한정 — 저장/복원 버전 동기화는 단위+Feature 가 커버.
