# audit:allow test-scenario-coverage reason: 인스톨러 비밀 수명주기의 시나리오 매트릭스 SSoT. 회귀 가드는 test_files 의 통과 테스트 + Manual 시나리오(실제 설치 2회 + storage grep) 로 커버.

feature: 인스톨러 비밀 수명주기 (state.json 평문 제거 → runtime.php 일원화)

description: |
  설치 과정에서 입력받는 비밀(DB 비밀번호 2종, 관리자 비밀번호 2종) 이
  storage/installer-state.json 에 평문으로 기록되어, 설치 실패/중단/finalize 미호출
  환경에서 무기한 잔존하던 결함을 수정한다 (이슈 #465).

  설계:
    - state.json(0664, 실패 시 무기한 잔존) 에는 비밀을 아예 기록하지 않는다.
    - 비밀 채널은 storage/installer/runtime.php(0600, finalize 시 삭제) 로 일원화.
      SSE 워커는 세션 접근이 불가하므로 파일 경유가 불가피하며, 세션을 보유한 유일한
      공통 시작점인 install-process.php 가 이송 지점이다 (SSE/폴링 공통, 재시도 포함).
    - 관리자 비밀번호는 db_seed 가 소비한 즉시 runtime 에서 제거 + putenv 해제
      (해제하지 않으면 이후 모든 exec() 자식이 평문을 ENV 상속).
    - 레거시/실패 경로 방어: 완료·중단·초기화·finalize 시점 redact 폴백.
    - 이미 설치된 사이트는 7.0.4 업그레이드 스텝이 잔존 파일을 정리.

  구조적 제약:
    state.config 에서 DB 비밀번호가 사라지므로 그 값을 읽던 소비처(db_cleanup /
    롤백 seed truncate) 는 hydrateDbSecretsFromRuntime() 으로 자격증명을 복원한다.
    두 소비처 모두 env_update 이후에만 실행되어 runtime.php 가 항상 존재한다.

axes:
  installation_mode: [sse, polling]
  session_state: [alive, lost_after_step3]
  retry_kind: [none, resume_after_failure, drop_tables_reconsent]
  runtime_state: [absent, present_with_db_only, present_with_db_and_admin]
  seed_outcome: [not_reached, success, failure]
  completion_path: [normal_finalize, finalize_unlink_failed, finalize_not_called, aborted, reset]
  read_db: [disabled, enabled_separate_host]
  legacy_state: [clean, has_plaintext_secrets_from_7_0_3_or_earlier]
  upgrade_trigger: [not_applicable, state_present_installed, state_present_not_installed, state_absent, state_corrupted]

exclusions:
  - { seed_outcome: not_reached, runtime_state: absent, reason: "env_update 이전 실패 — runtime 미생성이 정상" }
  - { session_state: lost_after_step3, runtime_state: absent, retry_kind: resume_after_failure, reason: "세션+runtime 동시 유실은 재개 불가 400 → Step 3 재입력 (의도된 안전 실패)" }
  - { upgrade_trigger: state_absent, legacy_state: has_plaintext_secrets_from_7_0_3_or_earlier, reason: "state 파일이 없으면 잔존 평문도 없음" }
  - { completion_path: reset, seed_outcome: success, reason: "reset 은 완료 전 상태 초기화 — 시딩 성공 후 경로 아님" }

