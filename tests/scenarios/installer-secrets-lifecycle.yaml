  - tests/Unit/Installer/InstallerRuntimeHelperTest.php
  - tests/Feature/Upgrade/RedactResidualInstallerStateSecretsTest.php

manual_verification:
  - scenario: A_sse_full_install
    description: |
      SSE 모드로 실제 설치 1회 완료 → 완료 후 storage/ 하위에서 입력한 관리자
      비밀번호 문자열 grep 무일치 (installer-state.json / installer/runtime.php /
      logs/installation.log 전부) + 그 비밀번호로 관리자 로그인 성공.
  - scenario: B_polling_full_install
    description: |
      폴링 모드로 동일 검증. SSE 와 동일하게 install-process.php 를 경유하므로
      비밀 이송 경로가 같아야 한다.
  - scenario: C_abort_midway
    description: |
      Step 5 진행 중 설치 중단 → 잔존 installer-state.json 에 admin_password /
      db_write_password 부재 확인 (redact 폴백). 이후 재개 시 정상 진행.
  - scenario: D_drop_tables_retry
    description: |
      기존 DB 가 있는 상태에서 drop_tables 재동의로 재설치 → db_seed 가 다시 실행되고
      관리자 계정이 정상 생성됨 (install-process.php 가 비밀번호를 runtime 에 재주입).
  - scenario: E_upgrade_existing_site
    description: |
      7.0.3 이하에서 설치되어 평문 비밀이 남은 installer-state.json 이 있는 사이트를
      7.0.4 로 업그레이드 → 파일 삭제(완료 사이트) 또는 비밀만 redact 확인.

rules_layer_coverage:
  - rule: upgrade-step-class-caching
    coverage: Upgrade_7_0_4 는 빈 위임자, 로직은 data/7.0.4/migrations/ 의 버전 namespace 클래스에 격리
  - rule: installer-pattern-no-copy-to-upgrade-step
    coverage: 업그레이드 스텝은 인스톨러 파일을 require 하지 않고 비밀 키 목록/파싱/저장을 로컬 인라인 중복 구현. CLI 컨텍스트이므로 chmod/chown 미시도 (기존 inode 권한 보존)
  - rule: service-provider-db-safety
    coverage: InstallerRuntimeServiceProvider 무수정 — runtime['db'] / runtime['app']['key'] 만 참조하므로 신규 admin 섹션은 무시됨
