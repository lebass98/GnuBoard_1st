notes: |
  세션 1(백엔드 라이프사이클, §19 단계 1~14)에서 금전 정확성·라이프사이클·스케줄러·알림 effects 를
  PHPUnit 으로 커버한다. UI/마이페이지/주입 effects 는 세션 2~3 의 Vitest 레이아웃 렌더링 +
  Playwright E2E 로 채운다. 부분취소 재안분(§6.3)은 fail→fix→green 4단계로 OrderAdjustmentServiceTest 에 고정.
