# audit:allow test-scenario-coverage reason: 이슈 #44 이커머스 마일리지 시스템 SSoT. axes cross product(수천 조합)는 docblock 전수 매핑이 비현실적이라 면제하고, 회귀 가드는 test_files(백엔드 PHPUnit 라이프사이클 + 프론트 Vitest + Playwright E2E)로 커버한다. effects 는 금전 정확성(FIFO/검증/캐시 정합/부분취소 재안분) + 라이프사이클(적립/사용/복원/회수/소멸/수동) + 스케줄러 + 알림을 망라 기록. 세션 1(백엔드)에서 라이프사이클 effects 를, 세션 2~3 에서 UI/마이페이지/E2E effects 를 채운다.

feature: 이커머스 마일리지 시스템 (Ecommerce Mileage)

description: |
  주문서 마일리지 사용 → FIFO 차감, 구매확정/배송완료 적립, 취소 복원/적립 회수,
  유효기간 소멸, 관리자 수동 지급/차감, 일괄 유효기간 연장까지 전 라이프사이클을 구현한다.
  잔액 SSoT 는 ecommerce_mileage_transactions(원장, SUM(remaining_amount WHERE 잔여>0 AND 미만료)),
  화면 주입은 ecommerce_mileage_balances(표시 전용 파생 캐시)에서 O(1) 조회한다.

  핵심 설계:
    - 금전 경로(차감/검증)는 원장 FOR UPDATE 재검증 — 캐시 미신뢰.
    - 적립 트리거 = 설정값(기본 confirmed/구매확정, delivered/배송완료 전환 가능) — 리스너·스케줄러 양쪽 반영.
    - 멱등: earn 은 order_option_id earn ledger 부재 검사, restore 는 order_cancel_id 존재검사.
    - 복원 lot 은 신규 lot(복원 시점 + expiry_days) — 원본 expires_at 승계 안 함.
    - 부분취소 시 잔여 옵션 subtotal_earned_points_amount 재안분 저장(§6.3 — 취소 상품 몫 제외).
    - 다통화: ledger.currency = 주문 기준통화 고정, point_value 는 스키마/UI만(기본 1).
    - 비회원(user_id null)은 적립/사용 전면 제외.

axes:
  actor: [member, guest]
  earn_trigger: [confirmed, delivered]
  earn_delay_days: [zero, positive]
  use_amount: [zero, below_min, valid_unit, invalid_unit, exceeds_max, exceeds_balance]
  currency_rule_max_type: [percent, fixed]
  cancel_kind: [full_cancel, partial_cancel]
  refund_priority: [points_first, pg_first]
  admin_action: [grant_with_policy_expiry, grant_with_direct_date, grant_unlimited, deduct_within_balance, deduct_exceeds_balance, extend_expiry]
  expiry_state: [active, expiring_soon, expired]
  withdrawal: [none, withdraw_with_balance]

exclusions:
  - { actor: guest, use_amount: [below_min, valid_unit, invalid_unit, exceeds_max, exceeds_balance], reason: "비회원은 마일리지 사용 0 처리 — 검증 axis 무의미" }
  - { actor: guest, admin_action: [grant_with_policy_expiry, grant_with_direct_date, grant_unlimited, deduct_within_balance, deduct_exceeds_balance, extend_expiry], reason: "수동 지급/차감 대상은 회원만" }
  - { earn_delay_days: positive, earn_trigger: [confirmed, delivered], reason: "지연>0 은 리스너 즉시 적립 스킵 + 스케줄러 담당 — 트리거 조합 무관하게 동일 경로" }

