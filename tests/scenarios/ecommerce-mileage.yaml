scenarios:
  - id: member_use_fifo_then_earn_on_confirm
    description: 회원 다중옵션 주문 + 마일리지 사용(상품별 안분) → 구매확정 → 즉시 적립(존재검사). 적립 기준액은 사용분 차감 후 금액.
    effects:
      - fifo_deducts_oldest_expiring_lot_first_under_for_update_lock
      - deduct_links_source_transaction_id_to_consumed_lot
      - listener_earns_on_after_confirm_when_trigger_confirmed_and_delay_zero
      - earn_for_order_option_uses_subtotal_earned_points_amount_as_amount
      - earn_idempotent_skips_when_earn_ledger_exists_for_option
      - cache_recalculated_for_user_after_every_balance_changing_path

  - id: earn_trigger_switch_confirmed_to_delivered
    description: 설정을 배송완료로 전환 → 구매확정만으로 미적립(pending) → 배송완료 진입 시 적립. 다시 구매확정으로 전환 시 구매확정 시점 적립.
    effects:
      - listener_earns_on_delivered_status_change_when_trigger_delivered_and_delay_zero
      - delivered_at_recorded_on_order_option_status_change_to_delivered
      - cache_pending_derived_from_order_options_not_ledger

  - id: delayed_earn_via_scheduler
    description: 지연일>0 설정 시 트리거 도달해도 리스너 즉시 적립 스킵 → 지연 경과 후 earn-mileage 커맨드가 적립 + 재실행 멱등 + pending→available 이동.
    effects:
      - listener_skips_immediate_earn_when_delay_positive_scheduler_handles
      - earn_mileage_command_processes_trigger_reached_options_past_delay_idempotently
      - earn_mileage_command_recalculates_pending_for_affected_users

  - id: partial_cancel_reallocation_pg_and_points_first
    description: 다중옵션 + 마일리지 일부 사용 → 1개 옵션 부분취소(마일리지 우선/PG 우선 각각) → 잔여 옵션 적립액 재안분 저장 → 적립 트리거 도달 시 그 갱신값 적립.
    effects:
      - partial_cancel_persists_recalculated_subtotal_earned_points_amount_pg_first
      - partial_cancel_persists_recalculated_subtotal_earned_points_amount_points_first
      - partial_cancel_excludes_cancelled_option_share_from_earned_points

  - id: full_cancel_restore_and_earn_cancel
    description: 주문 취소 → 사용분 복원(신규 lot, order_cancel_id 멱등) + 기적립 회수(self lot 우선 → FIFO → 부족분 metadata 기록).
    effects:
      - restore_for_cancel_idempotent_by_order_cancel_id
      - restore_issues_new_lot_with_fresh_expiry_not_inherited
      - cancel_earn_recovers_from_self_lot_then_fifo_then_records_shortfall_in_metadata
      - cancel_earn_triggered_on_cancelled_or_partial_cancelled_status_change

  - id: auto_expire_lots
    description: expires_at 도과 lot 에 expire-mileage 실행 → per-item expired 거래 + expired_at + 잔액 감소 + 재실행 멱등 + 캐시 동기화.
    effects:
      - expire_lots_records_per_item_expired_transaction_with_expired_at
      - expire_lots_decrements_balance_and_is_idempotent_on_rerun
      - expire_mileage_command_expires_due_lots_and_syncs_cache

  - id: admin_grant_and_deduct
    description: 관리자 수동 지급(정책/직접 날짜/무기한) + 차감(잔액 내 FIFO, 초과 시 422 거부) + 일괄 유효기간 연장.
    effects:
      - admin_earn_issues_lot_with_granted_by_and_memo_and_policy_or_direct_or_unlimited_expiry
      - admin_deduct_consumes_fifo_and_rejects_when_exceeds_balance_with_422
      - admin_deduct_records_negative_transaction_linked_to_source
      - extend_lot_expiry_updates_expires_at_for_remaining_lots_and_logs_activity
      - extend_lot_expiry_revives_expired_lot_and_recalculates_cache

  - id: validation_matrix
    description: 사용 검증 — 최소금액/사용단위/최대한도(percent·fixed)/결제금액/잔액 초과를 각각 거부 또는 보정.
    effects:
      - validate_usage_rejects_below_min_use_amount
      - validate_usage_rejects_amount_not_multiple_of_use_unit
      - validate_usage_rejects_exceeding_max_use_percent_or_fixed
      - validate_usage_rejects_exceeding_payment_amount
      - validate_usage_rejects_exceeding_balance
      - max_usable_caps_by_balance_limit_and_payment_then_floors_to_unit

  - id: cache_reconcile_drift
    description: 캐시 임의 오염 후 reconcile-mileage-balance 실행 → available/pending 원장·옵션 기준 재산출(자기 치유).
    effects:
      - cache_available_matches_ledger_sum_definition
      - cache_pending_derived_from_order_options_not_ledger
      - reconcile_command_recalculates_all_caches_from_ledger_and_options

  - id: withdrawal_records_expiry
    description: 잔액 보유 회원 탈퇴 → 활성 lot 을 expired 활동로그(금액·통화·회원ID)로 소멸 기록 후 삭제.
    effects:
      - withdrawal_records_expired_activity_log_with_amount_currency_userid_before_delete

  - id: expiring_notification
    description: N일 내 소멸 예정 보유 회원에게 notify-expiring 실행 → 윈도우 캐시 갱신 후 회원별 발송.
    effects:
      - notify_expiring_command_recalculates_window_then_dispatches_per_member
      - mileage_expiring_soon_definition_declared_with_mail_and_database_channels
      - extract_mileage_expiring_soon_builds_data_and_trigger_user_context

  - id: settings_currency_add_confirm_guard
    description: |
      마일리지 설정 통화 규칙 인라인 추가 — 입력 행을 열고 통화를 입력한 뒤 체크(✓) 확정 버튼을
      누르지 않은 채 저장하면, 임시 입력이 currency_rules 배열에 확정되지 않아 저장 시 사라진다.
      저장 sequence 는 미확정 상태(isAddingMileageCurrency/isAddingCurrency)에서 차단 + 경고 토스트를
      띄우고, 체크 확정 후에는 배열에 push 되어 정상 저장된다.
    effects:
      - settings_currency_add_requires_check_confirm_before_persisting_to_rules
      - settings_save_blocked_with_warning_when_currency_add_row_unconfirmed

