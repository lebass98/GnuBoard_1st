scenarios:
  - id: guest_full_flow_dbank_e2e
    description: 비회원 무통장입금 결제 → 자동 verify → 완료 화면 → 30분 안 재방문 (자동 인증) → 토큰 만료 후 조회 폼 재인증
    effects:
      - guest_orders_store_returns_201_with_order_number
      - store_success_when_guest_triggers_verify_automatically_with_orderer_phone_and_password
      - verify_success_saves_token_to_localStorage_g7_guest_order_token
      - navigate_to_shared_route_shop_orders_n_complete_for_both_member_and_guest
      - user_base_globalHeaders_auto_injects_x_guest_order_token_for_guest_orders_path
      - order_complete_shows_30min_auto_authentication_notice_for_guest_only
      - guest_order_form_verify_success_saves_token_and_navigates_to_complete_route

  - id: guest_full_flow_pg_card_e2e
    description: 비회원 카드 PG 결제 → PG 콜백 → 공유 라우트 완료 화면 진입 → 토큰으로 상세 표시
    effects:
      - order_complete_pg_redirect_url_works_for_guest_via_shared_route
      - order_complete_data_sources_if_branches_user_orders_vs_guest_orders_by_currentUser_uuid
      - user_base_globalHeaders_auto_injects_x_guest_order_token_for_guest_orders_path

  - id: member_unchanged_e2e
    description: 회원 결제 흐름이 비회원 분기 도입 후에도 회귀 없이 동작 (user/orders 호출, 회원 redirect_url 유지)
    effects:
      - checkout_summary_endpoint_branches_to_user_or_guest_orders_via_target_expression
      - order_complete_data_sources_if_branches_user_orders_vs_guest_orders_by_currentUser_uuid
      - navigate_to_shared_route_shop_orders_n_complete_for_both_member_and_guest

  - id: token_expiry_to_form_e2e
    description: 30분 후 상세 호출 → 401/404 → 토큰 삭제 + 조회 폼 안내 → 재인증
    effects:
      - order_complete_401_404_clears_token_and_shows_lookup_link
      - guest_order_form_accepts_order_number_phone_password_three_fields
      - guest_order_form_verify_failure_shows_unified_not_found_message

  - id: guest_no_token_direct_url_redirects_to_login
    description: 비로그인 + 토큰 부재 사용자가 /shop/orders/:n/complete 에 직접 진입하면 blur 가 콘텐츠를 가린 채 백엔드 404 응답 → errorHandling.404 비회원 분기가 토큰 정리 + 로그인 페이지로 이동
    effects:
      - order_complete_401_404_clears_token_and_shows_lookup_link
      - order_complete_blur_until_orderData_loaded_prevents_flash
      - order_complete_no_init_action_guard_to_avoid_currentUser_timing_misfire

  - id: member_login_clears_residual_guest_token
    description: 비회원으로 주문 토큰을 받은 사용자가 같은 브라우저에서 회원 로그인하면 잔존 비회원 토큰을 정리 (회원 컨텍스트에서 비회원 주문 페이지 노출 방지)
    effects:
      - login_success_clears_guest_order_token_from_localStorage_and_global

  - id: purchase_restriction_blocks_order_for_member_and_guest
    description: 구매 대상 제한이 설정된 상품을 허용 역할 밖 사용자(회원/비회원)가 주문 시도 → 서버가 주문 생성을 차단. 비회원은 코어 guest 역할로 판정
    effects:
      - purchase_eligibility_passes_when_product_has_no_restriction
      - purchase_eligibility_blocks_when_user_role_not_in_allowed_roles_for_member_and_guest
      - purchase_eligibility_uses_core_guest_role_for_unauthenticated_user
      - order_creation_blocked_with_cart_unavailable_when_restricted_product_in_cart

  - id: admin_guest_order_management
    description: 관리자가 주문 목록에서 비회원 주문을 필터링하고, 비회원 조회 비밀번호를 재설정 (회원 주문은 재설정 거부)
    effects:
      - admin_order_list_filters_by_member_type_guest_when_user_id_is_null
      - admin_reset_guest_lookup_password_rejects_member_order_with_422
      - admin_reset_guest_lookup_password_updates_hash_for_guest_order
      - admin_reset_guest_lookup_password_logs_activity

  - id: guest_order_notification_trigger_data
    description: 비회원 주문 이벤트에서 후속 이메일 발송 이슈가 사용할 주문자 이메일·주문번호 데이터를 확인 가능 (실제 발송은 본 이슈 범위 밖)
    effects:
      - order_exposes_orderer_email_and_is_guest_order_for_notification_recipients
      - guest_order_notification_event_carries_orderer_email_and_order_number

