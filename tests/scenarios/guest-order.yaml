# audit:allow test-scenario-coverage reason: 본 매니페스트는 이슈 #55 비회원 주문 흐름 SSoT 로 기록. axes 7종 cross product(5000조합)는 docblock 전수 매핑이 비현실적이라 면제하고, 회귀 가드는 test_files(백엔드 PHPUnit + 프론트 Vitest + Playwright E2E)로 커버한다. effects 는 작업 영역(주문생성/조회/상세/구매제한/관리자/알림)을 망라 기록.

feature: 비회원 주문 / 결제 / 조회 (Guest Order)

description: |
  로그인 없이 주문 생성 → 결제 → 완료 → 조회 → 상세/액션까지 회원과 동등한 흐름을
  제공한다. 회원/비회원 분기는 _global.currentUser?.uuid 와 X-Cart-Key / X-Guest-Order-Token
  헤더로 처리하며, 라우트는 공유(/shop/orders/:id/complete)하고 데이터소스가 if 분기로
  user/orders ↔ guest/orders 를 호출한다.

  배경:
    - 단계 1~4: 백엔드 (CreateOrderRequest 비회원 분기, GuestOrderController store/verify/show
      /cancel/estimate-refund/update-shipping-address/confirm-option, GuestOrderAuthService
      30분 HMAC 토큰, VerifyGuestOrderToken 미들웨어, 회원 주문 동결 조회 비밀번호 nullable).
    - 단계 5 A~D: 사용자 화면 (sirsoft-basic 템플릿).
      - A: 진입 분기 (장바구니/상품상세 → 비로그인 시 /login?redirect=checkout).
      - B: 주문서 비밀번호 필드 + 결제 엔드포인트 분기 (user/orders ↔ guest/orders).
      - C: 결제 직후 자동 verify → 완료 화면 + 조회 폼 + 토큰 만료 처리.
      - D: 진입 동선 (헤더 / 모바일 nav / 로그인 화면).

  핵심 설계:
    - 토큰은 특정 주문에 묶임 (verifyToken 이 order_number 일치 검증). 여러 주문은 별도 verify.
    - 30분 TTL 고정, 자동 갱신 없음 (보안 정책).
    - 공유 라우트 + auth_required: false + data_sources if 분기 (cart/checkout 패턴 일관).
    - PG 결제 successUrl 은 PG 플러그인 설정값 사용 (백엔드 redirect_url 분기 불필요).

axes:
  actor: [guest, logged_in_member]
  entry_point: [product_detail_buy_now, cart_order_button, header_lookup_link, mobile_nav_lookup_link, login_screen_lookup_link]
  payment_method: [dbank, vbank, mileage_full, card_pg, vaccount_pg]
  guest_lookup_password: [valid, missing, too_short, mismatch_confirmation]
  token_state: [fresh, valid_within_30min, expired, missing, wrong_order]
  order_action: [view_detail, cancel, estimate_refund, update_shipping_address, confirm_option]
  e2e_browser: [chromium]

exclusions:
  - { actor: logged_in_member, guest_lookup_password: [missing, too_short, mismatch_confirmation], reason: "회원은 guest_lookup_password nullable — 검증 미적용" }
  - { actor: logged_in_member, entry_point: [header_lookup_link, mobile_nav_lookup_link, login_screen_lookup_link], reason: "조회 진입 동선은 비회원만 노출" }
  - { token_state: [expired, missing, wrong_order], order_action: [cancel, estimate_refund, update_shipping_address, confirm_option], reason: "토큰 없거나 만료면 미들웨어가 사전 차단 — 액션 axis 무의미" }

