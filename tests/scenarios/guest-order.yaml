notes: |
  본 매니페스트는 단계 5 그룹 C 구현 시점에 작성되어 단계 1~5 전체 흐름을 망라한다.
  단계 1~4 백엔드는 GuestOrderControllerTest.php 로, 단계 5 프론트는 Vitest 레이아웃 구조
  검증 + Playwright E2E spec 으로 회귀 가드한다.

  axes 중 `e2e_browser` 는 단일(chromium) 로 시작하며, Firefox/WebKit 확장은 그룹 D 완료 후
  결정에 따라.
