# audit:allow test-scenario-coverage reason: 본 매니페스트는 Phase E′ Extension Point 슬롯 통합 + UX 재정의 시나리오 매트릭스 SSoT.

feature: KG이니시스 본인인증 — 코어 IDV 모달 Extension Point 슬롯 통합 + UX 재정의

description: |
  Phase E′ 의 setLauncher 폐기 + Extension Point 슬롯 패턴은 그대로 유지.
  Phase E′-Redesign 에서 추가된 사항:
    - 코어 모달 슬롯 콘텐츠를 사전 안내 카드 (3단계 절차 안내) + 진행 중 안내 (스피너 + 팝업 차단 회복) 로 재구성
    - 인증 완료 시 모달이 자동으로 닫히도록 fix — startAuth handler 의 postMessage 콜백이
      resolveIdentityChallenge + closeModal 을 sequence 로 dispatch (이전 결함: closeModal 누락)
    - _global.identityChallenge.providerInProgress 플래그로 슬롯 if 분기
    - 사용자가 인증 팝업을 직접 닫은 경우 모달은 열린 채 유지 → 시작 버튼 재클릭으로 재시도 가능

axes:
  flow_stage:
    - modal_opens_with_intro_card    # 코어 모달 자동 표시 + 슬롯에 사전 안내 카드 + "본인인증 시작" 버튼 노출 (providerInProgress=false)
    - user_clicks_start              # 사용자가 모달 안 Button 클릭 → startAuth handler 진입
    - popup_opens_in_progress_card   # window.open 성공 + form POST + providerInProgress=true 로 슬롯이 진행 중 안내로 전환
    - inicis_form_post               # 동적 form 이 mid/mtxid/authHash 포함 POST
    - bridge_postmessage             # bridge 페이지가 부모창에 결과 통보
    - resolve_and_close_sequence     # resolveIdentityChallenge + closeModal sequence dispatch → 모달 자동 닫힘 + return_request 재실행
    - user_closes_popup_before_auth  # 사용자가 인증 안 끝내고 팝업창 X 직접 닫음 → providerInProgress=false 로만 set → 모달 유지
  bridge_outcome:
    - verified                       # verification_token 부착
    - failed                         # identity_error (PROVIDER_ERROR / INVALID_AUTH_URL / REMOTE_CALL_FAILED / DECRYPT_FAILED / NOT_FOUND / ALREADY_CONSUMED)
    - cancelled                      # bridge 가 token/error 둘 다 미전달 (드문 케이스)
  popup_outcome:
    - postmessage_verified           # bridge → postMessage(verification_token) → resolve+close
    - postmessage_failed             # bridge → postMessage(identity_error) → resolve(failed)+close
    - postmessage_cancelled          # bridge → postMessage(데이터 없음) → resolve(cancelled)+close
    - user_closed_popup              # 사용자가 popup X 직접 닫음 → resolve dispatch 안 함, 모달 유지
    - popup_blocked                  # window.open null → toast 발행, providerInProgress 미set, 모달 유지
  provider_id_match:
    - inicis                         # _global.identityChallenge.provider_id === 'inicis' → 슬롯 컴포넌트 노출
    - other                          # 다른 provider → 슬롯 컴포넌트 비노출 (mail default UI 그대로)
  provider_in_progress:
    - false                          # 사전 안내 카드 + 시작 버튼 노출
    - true                           # 진행 중 안내 (스피너 + 팝업 차단 회복 안내) 노출
  user_status:
    - guest                          # 비로그인 (가입 / 비번찾기)
    - authenticated                  # 로그인 (마이페이지 정보 변경 등)

exclusions:
  - { provider_id_match: other, flow_stage: user_clicks_start, reason: "다른 provider 일 때 우리 Button 미노출" }
  - { provider_id_match: other, provider_in_progress: true, reason: "다른 provider 슬롯에는 우리 진행 중 카드 미적용" }
  - { popup_outcome: popup_blocked, flow_stage: popup_opens_in_progress_card, reason: "popup 차단 시 진행 중 카드 미진입" }
  - { popup_outcome: user_closed_popup, flow_stage: bridge_postmessage, reason: "사용자 직접 닫음은 postMessage 미수신" }
  - { popup_outcome: user_closed_popup, flow_stage: resolve_and_close_sequence, reason: "사용자 직접 닫음은 resolve 미dispatch (모달 유지)" }
  - { bridge_outcome: cancelled, popup_outcome: postmessage_failed, reason: "bridge cancelled 와 failed 는 상호 배타" }

