feature: KG이니시스 본인인증 — 설치 시 성인인증 목적별 프로바이더 초기값 세팅

description: |
  플러그인 설치(Plugin::install) 시 성인인증(inicis.adult_verification) 목적의 프로바이더
  매핑이 비어 있으면 이니시스로 1회 세팅한다. 코어 IDV 의 목적별 프로바이더 해석
  (IdentityVerificationManager::resolveForPurpose) 은 환경설정
  `settings.identity.purpose_providers.{purpose}` 를 참조하므로, 이 초기값이 있으면 운영자가
  별도 매핑 없이도 설치 직후부터 성인인증이 이니시스로 분기된다. 코어 무수정.

  "초기값" 성격 — 이미 운영자가 다른 프로바이더로 지정한 상태(재설치 등)에서는 덮어쓰지
  않아 운영자 선택을 보존한다.

axes:
  existing_mapping: [unset, set_other]     # unset: 매핑 미설정 / set_other: 운영자가 다른 프로바이더 지정

effects:
  - install_sets_inicis_when_mapping_unset          # unset → settings.identity.purpose_providers.inicis.adult_verification = 'inicis'
  - install_preserves_existing_operator_choice      # set_other → 기존 값 보존 (덮어쓰지 않음)
  - install_always_returns_true                     # install() 은 양 경우 모두 true 반환

test_files:
  - plugins/_bundled/sirsoft-verification_kginicis/tests/Feature/Identity/InicisInstallDefaultPurposeProviderTest.php

design_rationale: |
  설계 결정:
   - 설치 시 1회만 세팅(install 훅), 활성화/업그레이드 시 재적용하지 않음.
   - 운영자 변경 가능(초기값 성격) — 코어 settings 에 저장하므로 환경설정 UI
     (본인인증 > 프로바이더 탭, 목적별 매핑)에서 그대로 변경된다.
   - default_provider 메타(getIdentityPurposes 의 'default_provider' => 'inicis')는
     UI 표시용 힌트일 뿐 런타임 해석에서 강제되지 않으므로, 실제 분기를 위해서는
     settings 의 purpose_providers 매핑이 필요하다 → install 에서 초기값을 써넣는다.
