feature: KG이니시스 본인인증 — 인증 결과 부분 데이터 정합 (신원 핵심값 가드 + 부가 필드 null 저장)

description: |
  KG이니시스 본인확인 verify 결과 처리에서:
    - (신원 핵심값 가드) 본인확인 성공(resultCode=0000)이어도 신원 핵심값(이름·생년월일·운영자
      설정 기준 식별값)이 비어 있으면 VerificationResult::failure(INCOMPLETE_IDENTITY) +
      status=failed (토큰 미발급). 정상 본인확인이면 이 값들은 항상 제공되므로(주민/외국인등록번호
      기반 CI/DI), 누락은 비정상/위조 응답으로 보고 차단한다. 식별값 부재는 중복가입 차단
      (di_hash/ci_hash 가 유일 판정 키)을 조용히 무력화하므로 보안상 차단이 필요.
    - (설정 기준 식별값) duplicate_field=di → userDi, ci → userCi 가 필수. 비기준 식별값은
      와 있으면 함께 저장하되 필수 아님.
    - (부가 필드 정합 저장) 빈값 필드를 Crypt::encryptString('') 로 "암호화된 빈 문자열" 찌꺼기로
      저장하던 것을 null 저장으로 정정. null 저장이 실제 발생하는 대상은 이니시스가 보장하지 않는
      비핵심 부가 필드(ci2 등)이며, 신원 핵심값(name/phone/birthday)은 가드가 누락을 차단하므로
      정상 경로에선 항상 채워진다. record 컬럼(name/phone/birthday)도 방어적으로 nullable 로 마이그레이션.
    - (표시) INCOMPLETE_IDENTITY 안내 toast 를 프론트 $t: 다국어 키로 보강 (2번 매핑 위에 1줄 추가).

# axes.case — 본 기능의 동작은 "어느 필드가 비었는가 / 저장이 실패했는가" 단일 축(case)으로 결정된다 (각 값이 독립 케이스).
#   차단(INCOMPLETE_IDENTITY): name_absent / birthday_absent / phone_absent / di_setting_di_absent / ci_setting_ci_absent / both_identifiers_absent
#   차단(STORAGE_FAILED, 저장 원자성 보강): login_record_upsert_throws / guest_cache_stash_throws
#   통과: aux_field_absent(비핵심 누락+신원정상→null 저장) / all_present(암호화 저장) / both_identifiers_present(di설정+ci도 저장)
axes:
  case: [name_absent, birthday_absent, phone_absent, di_setting_di_absent, ci_setting_ci_absent, both_identifiers_absent, login_record_upsert_throws, guest_cache_stash_throws, aux_field_absent, all_present, both_identifiers_present]

effects:
  # 신원 핵심값 가드 (백엔드) — 이름·생년월일·휴대폰·설정 기준 식별값 (Chrome MCP 실측: 아이핀 채널은 전부 응답)
  - incomplete_identity_blocked_no_token        # name/birthday/phone/설정기준식별값 중 하나라도 누락 → failure(INCOMPLETE_IDENTITY), status=failed, 토큰 미발급
  # 부가(비핵심) 필드 정합 저장 (백엔드)
  - success_with_aux_field_stored_as_null       # 신원 핵심값 정상 + 비핵심(ci2 등) 누락 → success + 해당 컬럼 null (암호화 빈문자열 아님)
  - success_with_encrypted_storage              # 전 필드 정상 → success + 토큰 발급 + 암호화 저장 (회귀 방지)
  - success_stores_both_identifiers             # 설정기준값(di) 정상 + 비기준 식별값(ci)도 존재 → 둘 다 저장 (오는 건 다 받음)
  # 저장 원자성 보강 (백엔드) — "인증 성공(토큰 발급) = PII 저장됨" 무결성
  - storage_failure_rolls_back_token            # PII 저장(로그인 record upsert / 비로그인 cache stash) 실패 → 토큰 발급 롤백 + failure(STORAGE_FAILED), log 미verified
  - success_with_record_stored                  # 정상 경로 → success + 토큰 + record 저장 (롤백 가드 회귀 방지)
  # 표시 (프론트)
  - verify_failure_dispatches_error_toast_with_i18n_key   # INCOMPLETE_IDENTITY / STORAGE_FAILED 수신 시 대응 errors.* $t: toast 발행

test_files:
  - plugins/_bundled/sirsoft-verification_kginicis/tests/Feature/Identity/InicisPartialDataStorageTest.php
  - plugins/_bundled/sirsoft-verification_kginicis/tests/Feature/Identity/InicisVerifyStorageAtomicityTest.php
  - plugins/_bundled/sirsoft-verification_kginicis/tests/Feature/Listeners/CompleteInicisRecordAfterRegisterTest.php
  - plugins/_bundled/sirsoft-verification_kginicis/resources/js/__tests__/startAuthHandler.test.ts

rules_layer_coverage:
  - rule: i18n-key-naming
    coverage: incomplete_identity 안내는 exceptions.php(ko/en) + 프론트 ko/en.json errors.incomplete_identity + ja 번들 동기. 프론트 toast 는 $t: 다국어 키 — 하드코딩 금지.
  - rule: migration-down-required
    coverage: name/phone/birthday nullable 변경 마이그레이션에 down() (NOT NULL 복귀) + 한국어 comment 포함.

design_rationale: |
  설계 결정 (부분 데이터 처리 방향):
   - 차단 대상 = 신원 핵심값(이름·생년월일·휴대폰·설정 기준 식별값). Chrome MCP 실측(2026-06-23,
     아이핀 채널)에서 이름·휴대폰·생년월일·CI·DI 가 모두 응답에 채워짐을 확인 → 휴대폰도 항상 오는
     핵심값으로 포함. 법규(CI/DI 는 주민/외국인등록번호 기반 → 정상 본인확인이면 제공)·코드(식별값
     부재 = 중복차단 무력화)·업계 관례(본인확인 통과 = CI/DI 확보) 모두 차단을 뒷받침.
   - "DI·CI 둘 다 없는데 본인확인 성공" 은 정상 경로에 존재하지 않음(비등록 외국인은 본인확인 자체
     불성립). 기존 binding 테스트의 "외국인 빈 식별값 통과" 가정은 비현실로 판단해 갱신.
   - 신원 가드는 성인 가드보다 먼저 평가 — 생년월일이 아예 없으면 "미성년자(NOT_ADULT)" 단정 대신
     "신원 불완전(INCOMPLETE_IDENTITY)" 이 정확한 사유 (더 근본적 실패 우선).
   - 비핵심 부가 필드(ci2 등)는 이니시스 미보장이므로 누락 허용 + null 정합 저장 (찌꺼기 빈 암호문 금지).
     휴대폰은 신원 핵심값이라 누락 시 차단 대상 (위 incomplete_identity 케이스에 포함).
   - 토큰 재발급 가드(isVerified enum 비교)는 1번 PR, verify 실패 toast 매핑은 2번 PR 에서 처리됨.
     본 항목은 3번의 신원 가드 + 정합 저장 + INCOMPLETE_IDENTITY toast 1줄 보강.
   - (저장 원자성 보강) 토큰 발급(log update)과 PII 저장을 한 단위로 묶는다 (설계 결정 A안). PII 저장이
     실패하면 토큰 발급까지 롤백하고 STORAGE_FAILED 로 인증을 실패시켜 "인증 성공=PII 저장됨" 무결성을
     보장한다. 로그인 record upsert 는 DB 트랜잭션으로 묶고, 비로그인 cache stash 실패는 트랜잭션 콜백을
     예외 종료시켜 log update 를 롤백한다. 비로그인 가입 backfill(after_register listener)은 record 가
     이미 저장된 후속 단계라 롤백 대신 단계별 try/catch 로깅 + finally 로 stash 캐시 정리(PII 잔류 방지)를
     적용한다.