  - modules/_bundled/sirsoft-ecommerce/tests/Feature/Http/Controllers/Admin/OrderOptionBulkStatusTest.php
  - modules/_bundled/sirsoft-ecommerce/tests/Unit/Services/OrderOptionServiceTest.php
  - modules/_bundled/sirsoft-ecommerce/tests/Unit/Services/OrderServiceStockRedeductTest.php
