# audit:allow test-scenario-coverage reason: |
#   cross product 자동 전개는 audit 실행 환경에 js-yaml 부재로 검출되지 않는다(다른 번들 동일).
#   가입 통화 부여 axis 는 PHPUnit(AssignDefaultCurrencyOnRegisterListener/StoreEcommerceSettingsRequest
#   locales 검증)·Vitest(통화별 언어 Tag UI)가 커버하며 green 이다.
feature: 가입 시 locale 기반 통화 부여 + 통화별 언어 다중 매핑 (A4 — PO 신규)

description: |
  가입/회원생성 시 브라우저/locale 기반 기본통화 부여(환경설정>언어/통화의 통화별 언어 Tag 매핑 기준).
  매칭 충돌/미스 시 is_default 통화 우선 → default_currency 폴백. core.auth.after_register 구독.
  통화별 언어는 supported_locales 후보의 다중(Tag) 지정.

axes:
  signup_path:
    - user_register      # 유저 가입
    - admin_create       # 관리자 회원생성
  locale:
    - ko
    - en
    - ja
    - unmatched          # 매칭 없는 locale
  locales_mapping:
    - single_match       # 단일 통화 Tag 매칭
    - multi_match        # 여러 통화 Tag 중복 매칭
    - no_match           # 어느 통화에도 없음
  module_state:
    - installed
    - uninstalled

effects:
  # 가입 부여 (PHPUnit)
  - locale_matched_currency_assigned             # locale→통화 매칭 부여 (ja + JPY.locales=[ja] → JPY)
  - is_default_priority_on_multi_match           # 중복 매칭 시 is_default 통화 우선
  - default_currency_fallback_on_no_match        # 미매칭 시 default_currency 폴백
  - admin_create_assigns_or_explicit             # 관리자 회원생성 부여/폴백 또는 명시 지정
  - signup_form_default_is_session_currency      # 가입 폼 기본값=비회원 세션 통화
  # 통화별 언어 Tag (PHPUnit + Vitest)
  - currencies_locales_multi_validated           # currencies.*.locales 배열 검증(supported_locales 외 거부)
  - locale_tag_input_renders_candidates          # 환율 카드 TagInput 후보=supported_locales
  - locale_tag_multi_select_saves                # 다중 선택 저장
  # 설치 게이트 (PHPUnit)
  - uninstalled_no_currency_assignment           # 미설치 시 부여 안 일어남(코어 가입 정상)

test_files:
  - modules/_bundled/sirsoft-ecommerce/tests/Unit/Listeners/AssignDefaultCurrencyOnRegisterListenerTest.php
  - modules/_bundled/sirsoft-ecommerce/tests/Unit/Http/Requests/CurrencyLocalesValidationTest.php
  - modules/_bundled/sirsoft-ecommerce/resources/js/__tests__/layouts/currencyLocaleTagInput.test.tsx
