feature: 게시판 목록/검색 미리보기 비밀글·블라인드 본문 요약 차단

description: |
  게시판 내부 검색은 별도 엔드포인트가 아니라 게시글 목록 조회(index)에 search 필터를
  얹은 것이다. 비밀글(is_secret) · 블라인드(status=blinded) 게시글은 목록/검색 응답의
  본문 요약(content_preview)을 권한과 무관하게 빈 문자열로 차단한다.

  제목은 현행 유지(노출, 식별 허용) — 차단 대상은 content_preview 뿐.
  본문(content) 자체는 상세 조회(getFilteredContent)에서 권한자(작성자 본인·관리자)에게만
  노출되며, 이는 본 시나리오 범위 밖(별도: board-blinded-original-access / 비밀글 상세 정책)이다.

  수정 이력 (이슈 #413 item 37):
    - 결함: PostResource::toListArray 가 블라인드만 content_preview 를 비우고(#413-34) 비밀글은
      미처리 → 비로그인·제3자도 게시판 내부 검색/목록 응답에서 비밀글 본문 요약 열람 가능 (보안 결함).
    - 수정: PostResource::getMaskedContentPreviewForList 신설 — status=Blinded 또는 is_secret 이면
      권한 무관 빈 문자열. toListArray 가 이 헬퍼를 사용.
    - 정책 확정: 목록 미리보기는 권한자(작성자/관리자)에게도 숨김(상세에서만 본문 노출).
      DB select 심층방어는 미포함(응답 계층 차단만 — 노출 경계 차단 관례).
    - 통합검색(/api/search)은 쿼리에서 published+non-secret 만 검색하므로 누수 없음(무관).

axes:
  # 차단은 글 상태(secret/blinded)로 결정되며 viewer 권한과 무관(권한자도 목록은 숨김).
  # "권한자도 차단" 이 핵심 회귀이므로 viewer 를 변별 축으로 둔다.
  # post_state(published/secret/blinded)·channel(list/search) 변종은 effects 와 개별 테스트 메서드로 커버.
  viewer: [guest, other_member, author, manager]

effects:
  - published_preview_visible_in_list
  - secret_preview_empty_for_guest
  - secret_preview_empty_for_other_member
  - secret_preview_empty_for_author
  - secret_preview_empty_for_manager
  - secret_preview_empty_via_search_filter
  - blinded_preview_empty_in_list
  - secret_title_visible_in_list

test_files:
  - modules/_bundled/sirsoft-board/tests/Feature/PostSearchSecretPreviewTest.php
  - templates/_bundled/sirsoft-basic/__tests__/layouts/board-search-secret-content-preview.test.tsx

validation:
  note: |
    백엔드 효과별 단언은 PostSearchSecretPreviewTest 가 post_state×viewer cross product 로 커버.
    검색 경유(channel=search) 차단은 secret_preview_empty_via_search_filter 가 author_name 검색으로 고정
    (FULLTEXT 인덱스 트랜잭션 격리 불안정 회피 — list/search 가 동일 toListArray 코드라 대표 1건이면 충분).
    프론트 card 미리보기 게이트(content_preview='' → 미리보기 미노출)는
    board-search-secret-content-preview 레이아웃 테스트가 if 조건 의존성으로 고정.