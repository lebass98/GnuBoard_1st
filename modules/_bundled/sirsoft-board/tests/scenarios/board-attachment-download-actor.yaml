feature: 게시판 첨부 다운로드 활동이력 행위자 기록

description: |
  게시판 첨부파일을 회원이 다운로드하면 활동이력(attachment.download)의 행위자(user_id)가
  그 회원으로 기록된다. 비회원(게스트)은 종전과 동일하게 user_id 가 NULL 로 남는다.

  수정 이력 (이슈 #413 item 58b):
    - 결함: 다운로드가 레이아웃의 <a href="{{download_url}}"> 브라우저 직접 링크(GET)였다.
      G7 은 Sanctum 토큰 전용 인증인데 <a> 네비게이션에는 Authorization 헤더(토큰)가 실리지
      않아, download_url 이 가리키는 optional.sanctum 라우트가 요청을 guest 로 통과시켰다.
      그 결과 회원이 받아도 서버의 Auth::id() 가 NULL 이 되어 활동이력 행위자가 비어 있었다
      (upload / board.update 는 정상 — download 만 행위자 누락).
    - 수정:
      · 신규 핸들러 downloadAttachment (sirsoft-basic, sirsoft-admin_basic 각 등록):
        G7Core.api.get(url, { responseType: 'blob' }) 로 코어 ApiClient 를 거쳐 토큰을
        동반한 요청을 보내고, 받은 blob 을 objectURL → <a download> 클릭으로 저장한다
        (composite/ImageGallery.tsx 의 downloadAuthenticatedFile 과 동일 패턴).
      · 레이아웃 카드 3곳 전환: 사용자 _post_attachments(권한 분기 보존),
        관리자 _post_card_content / _reply_card_content(무분기) 의 <A href> → Div + click 핸들러.
    - 정책 확정:
      · 범위 = 게시판만 3곳 (페이지 첨부는 별도). 비회원 = NULL 유지(현행). 성공 토스트 없음.
      · 서버(라우트/컨트롤러/서비스) 무변경 — optional.sanctum 유지가 비회원 NULL 정책과 정합.

axes:
  card: [user_post, admin_post, admin_reply]

effects:
  - download_via_api_client_with_token
  - filename_preserved
  - download_card_uses_handler_not_anchor
  - no_permission_toast_preserved
  - member_download_records_user_id
  - guest_download_keeps_user_id_null
  - download_failure_shows_error_toast

test_files:
  - templates/_bundled/sirsoft-basic/src/handlers/__tests__/downloadAttachment.test.ts
  - templates/_bundled/sirsoft-admin_basic/src/handlers/__tests__/downloadAttachment.test.ts
  - templates/_bundled/sirsoft-basic/__tests__/layouts/board-attachment-download-handler.test.tsx
  - modules/_bundled/sirsoft-board/resources/js/__tests__/layouts/admin-attachment-download-handler.test.tsx
  - modules/_bundled/sirsoft-board/tests/Playwright/specs/user/board-attachment-download-actor.spec.ts

validation:
  note: |
    효과별 단언 매핑:
      - download_via_api_client_with_token / filename_preserved /
        download_failure_shows_error_toast:
        downloadAttachment.test.ts (basic + admin) — G7Core.api.get(url, {responseType:'blob'})
        호출 인자, blob → objectURL → click → revoke, 실패 시 toast.error 단언.
      - download_card_uses_handler_not_anchor:
        board-attachment-download-handler.test.tsx (사용자 카드),
        admin-attachment-download-handler.test.tsx (관리자 게시글/답변 카드) —
        카드가 <A href> 직접 링크가 아니라 click→custom:downloadAttachment 임을 단언.
      - no_permission_toast_preserved:
        board-attachment-download-handler.test.tsx — 권한 없을 때 download_no_permission 토스트 유지.
      - member_download_records_user_id / guest_download_keeps_user_id_null:
        Playwright spec (user/board-attachment-download-actor.spec.ts) — 회원 다운로드 시
        요청에 Authorization 헤더 동반 확인(토큰 경로), 비회원은 헤더 없음.
        실제 DB user_id 기록은 실환경 검수(Chrome MCP)로 최종 확인.