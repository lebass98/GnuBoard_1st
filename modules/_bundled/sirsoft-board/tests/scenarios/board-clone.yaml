feature: 게시판 복제 시 관리자/스텝 명단 + 권한 승계

description: |
  게시판 복제(copyBoard) 가 역할/관계 파생 5필드(board_manager_ids, board_managers,
  board_step_ids, board_steps, permissions) 를 채워 반환한다. 이를 통해 복제 폼이
  관리자 명단과 권한을 원본 그대로 싣고 저장할 수 있다.

  수정 이력 (이슈 #413 item 16):
    - 16-(1): copyBoard 가 toArray()(DB 컬럼만) 만 반환해 board_manager_ids 가 누락,
      복제 저장 시 StoreBoardRequest 의 required|array|min:1 에 걸려 422 발생 → 해소
    - 16-(2): permissions 미복사 + 역할 identifier 교차 게시판 누수 → 해소
      · permissions 를 accessor raw 로 채우되, 옛 slug 스코프(sirsoft-board.{old}.manager/.step)
        identifier 는 stripBoardScopeRoles 로 제거 (attachRoles 의 전역 whereIn 으로 인한 교차 누수 차단)
      · 새 게시판 manager/step 역할은 생성 시 injectBoardRolesToPermissions 가 자동 주입
      · 비-스코프 역할(member 등) 은 그대로 보존
    - PO 정책 확정: 복제는 원본 manager/step 명단을 승계 (순수 생성 모드는 본인 단독)
    - role 조회 로직은 BoardResource::getBoardRoleData 를 public static 으로 공유 (SSoT)

axes:
  original_permissions: [default, custom]

effects:
  - clone_includes_manager_ids
  - clone_includes_manager_objects_with_labels
  - clone_role_data_matches_resource_output
  - clone_strips_old_slug_scope_roles
  - clone_preserves_non_scope_roles
  - clone_saved_201
  - managers_copied
  - permissions_copied
  - no_cross_board_role_leak
  - clone_includes_add_to_menu_boolean
  - add_to_menu_validation_uses_translated_label

test_files:
  - modules/_bundled/sirsoft-board/tests/Feature/BoardCloneTest.php

validation:
  note: |
    효과별 단언은 BoardCloneTest 의 @scenario/@effects docblock 으로 매핑.
    프론트(복제 모드 폼 렌더링)는 admin-board-form 레이아웃 테스트가 별도 커버.