feature: 게시글 삭제 시 하위 데이터(댓글·첨부) 연쇄 soft delete + 선택 복원

description: |
  이슈 #413 item 69-② — 게시글을 삭제(soft delete)할 때 소속 댓글·첨부가 함께
  정리되지 않아, 게시글만 trashed 되고 댓글·첨부는 살아남아 목록/상세에서 고아로
  노출되던 문제를 수정한다. 동시에 게시글 복원 시 cascade 로 지워진 항목만 선택
  복원하여, 삭제 이전에 사용자가 직접 지운 항목이 게시글 복원과 함께 부활하는
  문제(우려)를 차단한다.

  근본 원인:
    · PostService::deletePost() 가 게시글 자신만 soft delete 하고 댓글·첨부는
      손대지 않았다 (PHPDoc 은 "댓글/첨부 명시적 삭제" 라고 적혀 있었으나 실제
      구현이 없는 PHPDoc-구현 불일치 상태였음).
    · 첨부 테이블(board_attachments)에는 cascade 와 사용자 삭제를 구분할
      trigger_type 컬럼 자체가 없었다.

  조치 (결정 방법1: 연쇄 soft delete + cascade 플래그 기반 선별 복원):
    · board_comments.trigger_type enum 에 'cascade' 추가 (마이그레이션).
    · board_attachments 에 trigger_type enum 컬럼 신설 (+ board_id/post_id/trigger_type
      복합 인덱스).
    · Comment/Attachment Repository 에 softDeleteByPostId (살아있는 행만
      trigger_type='cascade' + deleted_at 마킹) + restoreCascadedByPostId
      (onlyTrashed 중 trigger_type='cascade' 만 복원) 신설. 인터페이스 동기.
    · PostService::deletePost / restorePost 를 DB::transaction 으로 감싸 게시글 +
      하위 데이터를 단일 트랜잭션으로 처리.

  핵심 불변식:
    · 게시글 삭제 시점에 이미 trashed 인 댓글/첨부(사용자 직접 삭제 trigger_type='user'
      등)는 Eloquent 기본 스코프상 update 대상에서 제외되어 cascade 마킹/복원 모두
      영향을 받지 않는다.
    · 복원은 trigger_type='cascade' 인 행만 restore → 사용자가 먼저 지운 항목은
      게시글 복원 후에도 trashed 로 유지.

# axis 의미:
#   delete_trigger — 삭제 진입 경로(관리자/사용자 본인)별로 cascade 가 동일하게
#                    동작해야 하므로 핵심 축. 각 경로를 독립 테스트 메서드로 검증한다.
#   child_type(댓글/첨부)·prior_state(살아있음/사용자 선삭제)는 한 메서드 안에서
#   동시에 단언하므로 별도 축이 아니라 effects 로 커버한다
#   (board-delete-children-force-delete.yaml 과 동일한 설계).
#
# 삭제된 게시글 상세의 표시 계층(증상1·2 회귀)은 별도 매니페스트로 분리한다:
#   deleted-post-detail-visibility.yaml (axis: comment_trigger).
axes:
  delete_trigger: [admin, user]

effects:
  # 삭제 연쇄 (cascade soft delete)
  - live_comment_cascade_soft_deleted
  - live_attachment_cascade_soft_deleted
  - cascade_trigger_type_marked
  - user_pre_deleted_comment_untouched
  - user_pre_deleted_attachment_untouched
  # 복원 (cascade 선별)
  - cascaded_comment_restored_on_post_restore
  - cascaded_attachment_restored_on_post_restore
  - user_pre_deleted_comment_stays_trashed
  - user_pre_deleted_attachment_stays_trashed
  # 트랜잭션 무결성
  - delete_and_restore_wrapped_in_transaction

test_files:
  # 69-② — 게시글 삭제 연쇄 + 선택 복원 (백엔드)
  - modules/_bundled/sirsoft-board/tests/Feature/Admin/PostDeleteCascadeTest.php
