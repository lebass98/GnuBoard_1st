  - modules/_bundled/sirsoft-page/tests/Unit/Services/PageAttachmentServiceTest.php
  - modules/_bundled/sirsoft-page/tests/Feature/Admin/PageControllerTest.php
  - modules/_bundled/sirsoft-page/tests/Unit/Listeners/SeoPageCacheListenerTest.php
  - modules/_bundled/sirsoft-page/resources/js/__tests__/layouts/admin-page-layouts.test.ts
  - templates/_bundled/sirsoft-basic/src/components/composite/__tests__/FileUploaderLimit.test.ts
  - modules/_bundled/sirsoft-page/tests/Playwright/specs/admin/page-form-reset-on-route-switch.spec.ts
  - modules/_bundled/sirsoft-page/tests/Playwright/specs/admin/page-attachment-order.spec.ts
  - modules/_bundled/sirsoft-page/tests/Playwright/specs/admin/page-version-changed-fields-i18n.spec.ts

notes: |
  6-2 는 이커머스 상품 이미지(FileUploader + temp_key 연결 + reorder API)와 동일한 검증된
  패턴으로 정렬했다. 생성 모드 업로드 순서 연결은 PageAttachmentServiceTest, 수정 모드 reorder 와
  잔존 버그(라우트 전환 시 key 리마운트)는 admin_page_form 레이아웃 렌더 테스트로 확인.
  6-1 은 백엔드 Feature 테스트, 12-2 는 리스너 unit 테스트, 13 은 레이아웃 렌더 테스트로 커버.
  14 는 리스너 unit 테스트(after_restore 구독 단언) + Admin Feature 테스트(복원 엔드포인트 →
  상세 SEO 캐시 무효화 + 새 버전 생성·이력 보존)로 커버.

  E2E: 페이지 모듈에 Playwright 인프라(playwright.config.ts + page-auth/page-seed fixture +
  playwright:seed-page stub 커맨드)를 이커머스와 동일 패턴으로 신설했다. spec 3건은
  form_mode / upload_count / page_change axis 와 1:1 매핑되며, 대상 화면에 data-testid 가
  아직 없어 test.describe.skip placeholder 로 등록(각 spec docblock 에 활성화 절차 명시).
  실제 회귀 가드는 위 단위/Feature/레이아웃 렌더 테스트가 담당하고, spec 은 data-testid 보강 +
  seed 로직 구현 후 활성화된다 (이커머스 product-seo-input-debounce 등과 동일 운용).
